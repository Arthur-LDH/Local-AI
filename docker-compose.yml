name: ${PROJECT_NAME:-local-ai}

services:

  ollama:
    image: ollama/ollama:${OLLAMA_VERSION:-0.30.7}
    container_name: ${PROJECT_NAME:-local-ai}.ollama
    restart: unless-stopped
    networks:
      - llm-net
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:--1}
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH:-32768}
    volumes:
      - ollama-models:/root/.ollama

  litellm:
    image: ghcr.io/berriai/litellm:${LITELLM_VERSION:-v1.88.1}
    container_name: ${PROJECT_NAME:-local-ai}.litellm
    restart: unless-stopped
    networks:
      - llm-net
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      DATABASE_URL: ${DATABASE_URL}
      STORE_MODEL_IN_DB: "True"
      LITELLM_TELEMETRY: "False"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  llm-net:
    driver: bridge

volumes:
  ollama-models:
